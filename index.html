<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canlı Piyasa Tabelası</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background:#050505;
    color:#fff;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.led-board {
    width:450px;
    background:#111;
    border:4px solid #333;
    border-radius:12px;
    padding:20px;
}

.header {
    text-align:center;
    color:#ff3333;
    font-size:22px;
    font-weight:bold;
    margin-bottom:15px;
}

.currency-row {
    display:flex;
    justify-content:space-between;
    padding:12px;
    margin:8px 0;
    background:#1a1a1a;
    border-radius:6px;
}

.name { flex:2; font-weight:bold; }
.price { flex:1; text-align:right; }

.buy { color:#00ffcc; }
.sell { color:#ff3366; }

.loading {
    text-align:center;
    color:#ffcc00;
    padding:20px;
}
</style>
</head>

<body>

<div class="led-board">
    <div class="header">CANLI PİYASA PANOSU</div>

    <div id="loading" class="loading">Veriler Yükleniyor...</div>
    <div id="container" style="display:none;"></div>

</div>

<script>

async function update() {
    try {

        // ✔ DOĞRU API
        const res = await fetch("https://open.er-api.com/v6/latest/TRY");
        const data = await res.json();

        const usd = data.rates.USD;
        const eur = data.rates.EUR;

        // ✔ ALTIN (ONS) API (ayrı)
        const goldRes = await fetch("https://api.metals.live/v1/spot/gold");
        const goldData = await goldRes.json();

        const goldOunce = goldData[0].price;

        const gramGoldUSD = goldOunce / 31.1035;
        const gramGoldTRY = gramGoldUSD * usd;

        const usdBuy = (usd * 0.997).toFixed(2);
        const usdSell = (usd * 1.003).toFixed(2);

        const eurBuy = (eur * 0.996).toFixed(2);
        const eurSell = (eur * 1.004).toFixed(2);

        const goldBuy = (gramGoldTRY * 0.992).toFixed(2);
        const goldSell = (gramGoldTRY * 1.008).toFixed(2);

        document.getElementById("container").innerHTML = `
            <div class="currency-row">
                <div class="name">USD / TRY</div>
                <div class="price buy">${usdBuy}</div>
                <div class="price sell">${usdSell}</div>
            </div>

            <div class="currency-row">
                <div class="name">EUR / TRY</div>
                <div class="price buy">${eurBuy}</div>
                <div class="price sell">${eurSell}</div>
            </div>

            <div class="currency-row">
                <div class="name">GRAM ALTIN</div>
                <div class="price buy">${goldBuy}</div>
                <div class="price sell">${goldSell}</div>
            </div>
        `;

        document.getElementById("loading").style.display = "none";
        document.getElementById("container").style.display = "block";

    } catch (err) {
        console.log(err);
        document.getElementById("loading").innerText = "Veri çekilemedi!";
    }
}

update();
setInterval(update, 10000);

</script>

</body>
</html>
