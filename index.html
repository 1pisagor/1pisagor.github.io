<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuyumcu Canlı Fiyat Paneli</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: sans-serif; }
    </style>
</head>
<body class="p-6">

    <div class="flex justify-between items-center border-b border-gray-700 pb-4 mb-6">
        <h1 class="text-3xl font-bold text-amber-500 uppercase tracking-wider">💎 ÖZAN KUYUMCULUK</h1>
        <div class="text-right">
            <p id="saat" class="text-2xl font-mono font-bold text-gray-300">00:00:00</p>
            <p class="text-xs text-emerald-400 font-semibold animate-pulse">● Canlı Piyasa Aktif</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="bg-gray-800 p-6 rounded-2xl border border-amber-500/30 shadow-xl">
            <h2 class="text-xl font-bold text-amber-400 mb-4">24 Ayar Has Altın (Gram)</h2>
            <div class="flex justify-between text-center">
                <div>
                    <span class="text-xs text-gray-400 block mb-1">ALIŞ (TL)</span>
                    <span id="has-alis" class="text-3xl font-mono font-bold text-white">---</span>
                </div>
                <div class="border-l border-gray-700 h-12 my-auto"></div>
                <div>
                    <span class="text-xs text-gray-400 block mb-1">SATIŞ (TL)</span>
                    <span id="has-satis" class="text-3xl font-mono font-bold text-amber-500">---</span>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl border border-yellow-600/30 shadow-xl">
            <h2 class="text-xl font-bold text-yellow-500 mb-4">Yeni Çeyrek Altın</h2>
            <div class="flex justify-between text-center">
                <div>
                    <span class="text-xs text-gray-400 block mb-1">ALIŞ (TL)</span>
                    <span id="ceyrek-alis" class="text-3xl font-mono font-bold text-white">---</span>
                </div>
                <div class="border-l border-gray-700 h-12 my-auto"></div>
                <div>
                    <span class="text-xs text-gray-400 block mb-1">SATIŞ (TL)</span>
                    <span id="ceyrek-satis" class="text-3xl font-mono font-bold text-yellow-500">---</span>
                </div>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl border border-emerald-600/30 shadow-xl">
            <h2 class="text-xl font-bold text-emerald-400 mb-4">Amerikan Doları (USD)</h2>
            <div class="flex justify-between text-center">
                <div>
                    <span class="text-xs text-gray-400 block mb-1">ALIŞ</span>
                    <span id="usd-alis" class="text-3xl font-mono font-bold text-white">---</span>
                </div>
                <div class="border-l border-gray-700 h-12 my-auto"></div>
                <div>
                    <span class="text-xs text-gray-400 block mb-1">SATIŞ</span>
                    <span id="usd-satis" class="text-3xl font-mono font-bold text-emerald-400">---</span>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-8 text-center text-xs text-gray-500">
        Fiyatlar anlık olarak güncellenmektedir. Veri Sağlayıcı: Ozan Döviz API
    </div>

    <script>
        // ÖNEMLİ AYARLAR: Kuyumcunun kendi kâr marjları
        const KAR_YUZDESI = 1.02; // %2 kâr ekler (Örn: 6000 TL ise 6120 TL yapar)
        const CEYREK_CARPAN = 1.605; // Çeyrek altın has karşılığı çarpanı

        async function fiyatlariGetir() {
            try {
                // CORS hatası alırsanız yerel sunucuda (Node.js/PHP) bir proxy oluşturmanız gerekebilir.
                const response = await fetch('https://ozandoviz.com/allinone.php');
                const data = await response.json();

                // API'den gelen ham verileri değişkenlere atıyoruz (API'deki tam key isimlerine göre güncelleyin)
                let hasAlis = parseFloat(data.HAS_ALTIN.Alis);
                let hasSatis = parseFloat(data.HAS_ALTIN.Satis);
                let usdAlis = data.USD.Alis;
                let usdSatis = data.USD.Satis;

                // Kuyumcu kâr marjını ekleme uygulaması
                let magazaHasSatis = hasSatis * KAR_YUZDESI;

                // Çeyrek Altın Hesaplama (Has fiyatı üzerinden otomatik hesaplama örneği)
                let ceyrekAlis = hasAlis * CEYREK_CARPAN;
                let ceyrekSatis = magazaHasSatis * CEYREK_CARPAN + 50; // +50 TL işçilik

                // HTML Elemanlarını Güncelleme
                document.getElementById('has-alis').innerText = hasAlis.toFixed(2) + " ₺";
                document.getElementById('has-satis').innerText = magazaHasSatis.toFixed(2) + " ₺";
                
                document.getElementById('ceyrek-alis').innerText = Math.round(ceyrekAlis) + " ₺";
                document.getElementById('ceyrek-satis').innerText = Math.round(ceyrekSatis) + " ₺";

                document.getElementById('usd-alis').innerText = usdAlis + " ₺";
                document.getElementById('usd-satis').innerText = usdSatis + " ₺";

            } catch (error) {
                console.error("Veri çekilirken hata oluştu:", error);
            }
        }

        // Saat Fonksiyonu
        setInterval(() => {
            const d = new Date();
            document.getElementById('saat').innerText = d.toLocaleTimeString('tr-TR');
        }, 1000);

        // İlk açılışta çalıştır ve her 5 saniyede bir güncelle
        fiyatlariGetir();
        setInterval(fiyatlariGetir, 5000);
    </script>
</body>
</html>
