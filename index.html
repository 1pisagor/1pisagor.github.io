<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuyumcu Canlı Fiyat Paneli</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: sans-serif; }
    </style>
</head>
<body class="p-6">

    <!-- Başlık Bölümü -->
    <div class="flex justify-between items-center border-b border-gray-700 pb-4 mb-6">
        <h1 class="text-3xl font-bold text-amber-500 uppercase tracking-wider">💎 ÖZAN KUYUMCULUK</h1>
        <div class="text-right">
            <p id="saat" class="text-2xl font-mono font-bold text-gray-300">00:00:00</p>
            <p class="text-xs text-emerald-400 font-semibold animate-pulse">● Canlı Piyasa Aktif</p>
        </div>
    </div>

    <!-- Fiyat Kartları -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- 24 Ayar Has Altın -->
        <div class="bg-gray-800 p-6 rounded-2xl border border-amber-500/30 shadow-xl">
            <h2 class="text-xl font-bold text-amber-400 mb-4">24 Ayar Has Altın (Gram)</h2>
            <div class="flex justify-between text-center">
                <div>
                    <span class="text-xs text-gray-400 block mb-1">ALIŞ (TL)</span>
                    <span id="has-alis" class="text-3xl font-mono font-bold text-white">---</span>
                </div>
                <div class="border-l border-gray-700 h-12 my-auto"></div>
                <div>
                    <span class="text-xs text-gray-400 block mb-1">SATIŞ (TL)</span>
                    <span id="has-satis" class="text-3xl font-mono font-bold text-amber-500">---</span>
                </div>
            </div>
        </div>

        <!-- Çeyrek Altın -->
        <div class="bg-gray-800 p-6 rounded-2xl border border-yellow-600/30 shadow-xl">
            <h2 class="text-xl font-bold text-yellow-500 mb-4">Yeni Çeyrek Altın</h2>
            <div class="flex justify-between text-center">
                <div>
                    <span class="text-xs text-gray-400 block mb-1">ALIŞ (TL)</span>
                    <span id="ceyrek-alis" class="text-3xl font-mono font-bold text-white">---</span>
                </div>
                <div class="border-l border-gray-700 h-12 my-auto"></div>
                <div>
                    <span class="text-xs text-gray-400 block mb-1">SATIŞ (TL)</span>
                    <span id="ceyrek-satis" class="text-3xl font-mono font-bold text-yellow-500">---</span>
                </div>
            </div>
        </div>

        <!-- Dolar (USD) -->
        <div class="bg-gray-800 p-6 rounded-2xl border border-emerald-600/30 shadow-xl">
            <h2 class="text-xl font-bold text-emerald-400 mb-4">Amerikan Doları (USD)</h2>
            <div class="flex justify-between text-center">
                <div>
                    <span class="text-xs text-gray-400 block mb-1">ALIŞ</span>
                    <span id="usd-alis" class="text-3xl font-mono font-bold text-white">---</span>
                </div>
                <div class="border-l border-gray-700 h-12 my-auto"></div>
                <div>
                    <span class="text-xs text-gray-400 block mb-1">SATIŞ</span>
                    <span id="usd-satis" class="text-3xl font-mono font-bold text-emerald-400">---</span>
                </div>
            </div>
        </div>

    </div>

    <!-- Alt Bilgi -->
    <div class="mt-8 text-center text-xs text-gray-500">
        Fiyatlar anlık olarak güncellenmektedir. Veri Sağlayıcı: Ozan Döviz API
    </div>

    <script>
        // AYARLAR: Kendi kâr oranlarınızı buradan değiştirebilirsiniz
        const KAR_YUZDESI = 1.02;    // Satış fiyatına %2 kâr ekler
        const CEYREK_CARPAN = 1.605; // Çeyrek altın has altın çarpanı

        // Metinsel fiyatı temizleyip sayıya çeviren yardımcı fonksiyon (Nokta/Virgül karmaşasını çözer)
        function temizleVeCevir(deger) {
            if (!deger) return 0;
            let temiz = deger.toString().replace(/\./g, '').replace(',', '.');
            return parseFloat(temiz);
        }

        async function fiyatlariGetir() {
            try {
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const targetUrl = 'https://ozandoviz.com/allinone.php';
                
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                if (!response.ok) throw new Error('Ağ yanıtı başarısız');
                
                const json = await response.json();
                const data = JSON.parse(json.contents);

                // API anahtarlarını hem büyük hem küçük harf ihtimaline karşı güvenli şekilde arıyoruz
                const altinData = data.HAS_ALTIN || data.has_altin || data.GA || {};
                const usdData = data.USD || data.usd || {};

                if (!altinData.Alis && !altinData.alis) {
                    console.log("API yapısı farklı, gelen ham veri:", data);
                }

                // Verileri güvenli şekilde sayıya çeviriyoruz
                let hasAlis = temizleVeCevir(altinData.Alis || altinData.alis || altinData.Buying);
                let hasSatis = temizleVeCevir(altinData.Satis || altinData.satis || altinData.Selling);
                let usdAlis = temizleVeCevir(usdData.Alis || usdData.alis || usdData.Buying);
                let usdSatis = temizleVeCevir(usdData.Satis || usdData.satis || usdData.Selling);

                // Değerler sıfır değilse ekrana yazdırıyoruz
                if (hasAlis > 0 && hasSatis > 0) {
                    let magazaHasSatis = hasSatis * KAR_YUZDESI;
                    let ceyrekAlis = hasAlis * CEYREK_CARPAN;
                    let ceyrekSatis = (hasSatis * CEYREK_CARPAN) + 50; // +50 TL işçilik

                    document.getElementById('has-alis').innerText = hasAlis.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " ₺";
                    document.getElementById('has-satis').innerText = magazaHasSatis.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " ₺";
                    
                    document.getElementById('ceyrek-alis').innerText = Math.round(ceyrekAlis).toLocaleString('tr-TR') + " ₺";
                    document.getElementById('ceyrek-satis').innerText = Math.round(ceyrekSatis).toLocaleString('tr-TR') + " ₺";
                }

                if (usdAlis > 0 && usdSatis > 0) {
                    document.getElementById('usd-alis').innerText = usdAlis.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " ₺";
                    document.getElementById('usd-satis').innerText = usdSatis.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " ₺";
                }

            } catch (error) {
                console.error("Veri güncellenirken hata oluştu:", error);
            }
        }

        // Saat Sayacı
        setInterval(() => {
            const d = new Date();
            document.getElementById('saat').innerText = d.toLocaleTimeString('tr-TR');
        }, 1000);

        // Sayfa açıldığında ilk yükleme ve her 8 saniyede bir yenileme
        fiyatlariGetir();
        setInterval(fiyatlariGetir, 8000);
    </script>
</body>
</html>
