<script>

async function update() {
    try {

        // ✔ CORS SORUNSUZ DÖVİZ API
        const res = await fetch("https://api.frankfurter.app/latest?from=TRY&to=USD,EUR");
        const data = await res.json();

        const usd = data.rates.USD;
        const eur = data.rates.EUR;

        // ✔ ALTIN (manuel yaklaşık TRY/USD üzerinden)
        const goldUSD = 70; // 1 gram altın USD yaklaşık (sabit fallback)
        const usdTry = usd;

        const gramGoldTRY = goldUSD * usdTry;

        const usdBuy = (usd * 0.997).toFixed(2);
        const usdSell = (usd * 1.003).toFixed(2);

        const eurBuy = (eur * 0.996).toFixed(2);
        const eurSell = (eur * 1.004).toFixed(2);

        const goldBuy = (gramGoldTRY * 0.992).toFixed(2);
        const goldSell = (gramGoldTRY * 1.008).toFixed(2);

        document.getElementById("container").innerHTML = `
            <div class="currency-row">
                <div class="name">USD / TRY</div>
                <div class="price buy">${usdBuy}</div>
                <div class="price sell">${usdSell}</div>
            </div>

            <div class="currency-row">
                <div class="name">EUR / TRY</div>
                <div class="price buy">${eurBuy}</div>
                <div class="price sell">${eurSell}</div>
            </div>

            <div class="currency-row">
                <div class="name">GRAM ALTIN</div>
                <div class="price buy">${goldBuy}</div>
                <div class="price sell">${goldSell}</div>
            </div>
        `;

        document.getElementById("loading").style.display = "none";
        document.getElementById("container").style.display = "block";

    } catch (err) {
        console.log("HATA:", err);

        document.getElementById("loading").innerHTML =
            "⚠️ API engellendi (CORS / limit). Sayfa çalışıyor ama veri çekilemiyor.";
    }
}

update();
setInterval(update, 15000);

</script>
