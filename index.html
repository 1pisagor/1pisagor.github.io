<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Piyasa Tabelası</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #050505;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .led-board {
            background: #111;
            border: 4px solid #333;
            border-radius: 12px;
            padding: 20px;
            width: 450px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
        }
        .header {
            text-align: center;
            color: #ff3333;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            border-bottom: 2px dashed #222;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }
        .row-header {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 12px;
            font-weight: bold;
            padding: 0 10px 5px 10px;
        }
        .currency-row {
            display: flex;
            align-items: center;
            background: #1a1a1a;
            margin: 8px 0;
            padding: 12px;
            border-radius: 6px;
            border-left: 5px solid #ffcc00;
        }
        .name { flex: 2; font-size: 18px; font-weight: bold; color: #fff; }
        .price { flex: 1.5; font-size: 20px; font-weight: bold; text-transform: uppercase; text-align: right; }
        .buy { color: #00ffcc; }
        .sell { color: #ff3366; }
        .footer { text-align: center; font-size: 11px; color: #444; margin-top: 15px; }
        .loading { text-align: center; color: #ffcc00; font-size: 16px; padding: 20px; }
    </style>
</head>
<body>

<div class="led-board">
    <div class="header">CANLI PİYASA PANOSU</div>
    <div class="row-header">
        <span style="flex: 2;">CİNSİ</span>
        <span style="flex: 1.5; text-align: right;">ALIŞ</span>
        <span style="flex: 1.5; text-align: right;">SATIŞ</span>
    </div>
    <div id="loading-text" class="loading">Veriler Getiriliyor...</div>
    <div id="data-container" style="display: none;"></div>
    <div class="footer" id="update-timer">Yükleniyor...</div>
</div>

<script>
    async function verileriGuncelle() {
        try {
            // Doğrudan açık kaynaklı ve engelsiz küresel döviz API'sinden TL kurlarını çekiyoruz
            const response = await fetch("https://er-api.com");
            if (!response.ok) throw new Error('Hata oluştu');
            const data = await response.json();
            
            // API verileri TRY bazlı geldiği için 1'i o kura bölerek normal değerleri buluyoruz
            const usdPrice = (1 / data.rates.USD);
            const eurPrice = (1 / data.rates.EUR);
            
            // Altın (XAU) onsu üzerinden Has Altın gram fiyatı hesaplama (Yaklaşık piyasa makası eklenerek)
            const onsPrice = (1 / data.rates.XAU);
            const gramAltin = (onsPrice / 31.1035);

            // Alış ve satış fiyatları için küçük sanal makaslar (tabela görüntüsü için)
            const usdBuy = (usdPrice * 0.997).toFixed(3);
            const usdSell = (usdPrice * 1.003).toFixed(3);
            
            const eurBuy = (eurPrice * 0.996).toFixed(3);
            const eurSell = (eurPrice * 1.004).toFixed(3);
            
            const goldBuy = (gramAltin * 0.992).toFixed(2);
            const goldSell = (gramAltin * 1.008).toFixed(2);

            let htmlContent = `
                <div class="currency-row">
                    <div class="name">USD / TL</div>
                    <div class="price buy">${usdBuy}</div>
                    <div class="price sell">${usdSell}</div>
                </div>
                <div class="currency-row">
                    <div class="name">EUR / TL</div>
                    <div class="price buy">${eurBuy}</div>
                    <div class="price sell">${eurSell}</div>
                </div>
                <div class="currency-row">
                    <div class="name">HAS ALTIN</div>
                    <div class="price buy">${goldBuy}</div>
                    <div class="price sell">${goldSell}</div>
                </div>
            `;

            document.getElementById('data-container').innerHTML = htmlContent;
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('data-container').style.display = 'block';
            const simdi = new Date();
            document.getElementById('update-timer').innerText = "Son Güncelleme: " + simdi.toLocaleTimeString();
        } catch (error) {
            console.error("Hata:", error);
            document.getElementById('loading-text').innerText = "Veri yenilenirken hata oluştu...";
        }
    }

    verileriGuncelle();
    // Her 10 saniyede bir fiyatları arkada sessizce günceller
    setInterval(verileriGuncelle, 10000);
</script>

</body>
</html>
